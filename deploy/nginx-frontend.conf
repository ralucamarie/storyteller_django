# Angular SPA frontend for povesticupesti.ro
# Install: /etc/nginx/sites-available/storyteller-frontend

server {
    listen 80;
    listen [::]:80;
    server_name povesticupesti.ro www.povesticupesti.ro;

    root /home/ubuntu/frontend;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|webp)$ {
        expires 7d;
        access_log off;
    }
}
