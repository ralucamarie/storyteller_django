# nginx reverse proxy for the Storyteller Django API.
# Install on the VPS as: /etc/nginx/sites-available/storyteller
#
#   sudo cp deploy/nginx-storyteller.conf /etc/nginx/sites-available/storyteller
#   sudo ln -s /etc/nginx/sites-available/storyteller /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d api.povesticupesti.ro   # adds HTTPS + redirect
#
# After certbot runs it rewrites this file to listen on 443 with the
# Let's Encrypt certificate and adds an http->https redirect automatically.

server {
    listen 80;
    listen [::]:80;
    server_name api.povesticupesti.ro;

    # Allow image uploads (writings/avatars).
    client_max_body_size 25M;

    # Collected static files (WhiteNoise also serves these via Django, but
    # letting nginx serve them directly is faster).
    location /static/ {
        alias /home/ubuntu/storyteller/staticfiles/;
        access_log off;
        expires 30d;
    }

    # User-uploaded media.
    location /media/ {
        alias /home/ubuntu/storyteller/media/;
        access_log off;
        expires 7d;
    }

    location / {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }
}
